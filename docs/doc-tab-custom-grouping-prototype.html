<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文档页签自定义分组原型</title>
  <style>
    :root {
      color-scheme: light;
      --b3-theme-background: oklch(98.2% 0.006 235);
      --b3-theme-surface: oklch(96.4% 0.008 235);
      --b3-theme-surface-light: oklch(92.2% 0.012 235);
      --b3-theme-on-background: oklch(24% 0.018 238);
      --b3-theme-on-surface: oklch(31% 0.018 238);
      --b3-theme-on-surface-light: oklch(52% 0.018 238);
      --b3-theme-primary: oklch(55% 0.13 235);
      --b3-theme-primary-light: oklch(92.4% 0.04 235);
      --tm-bg: var(--b3-theme-background);
      --tm-surface: color-mix(in oklch, var(--b3-theme-background) 84%, var(--b3-theme-surface));
      --tm-surface-2: color-mix(in oklch, var(--b3-theme-surface) 86%, var(--b3-theme-background));
      --tm-surface-3: color-mix(in oklch, var(--b3-theme-surface-light) 72%, var(--b3-theme-background));
      --tm-border: color-mix(in oklch, var(--b3-theme-on-background) 12%, transparent);
      --tm-border-soft: color-mix(in oklch, var(--b3-theme-on-background) 7%, transparent);
      --tm-text: var(--b3-theme-on-background);
      --tm-text-2: var(--b3-theme-on-surface);
      --tm-muted: var(--b3-theme-on-surface-light);
      --tm-primary: var(--b3-theme-primary);
      --tm-primary-soft: var(--b3-theme-primary-light);
      --tm-success: oklch(56% 0.12 154);
      --tm-warning: oklch(66% 0.13 72);
      --tm-danger: oklch(58% 0.15 26);
      --tm-purple: oklch(58% 0.12 295);
      --tm-teal: oklch(58% 0.10 188);
      --tm-shadow: 0 16px 42px color-mix(in oklch, var(--tm-text) 10%, transparent);
      --tm-radius: 8px;
      --tm-sidebar: 284px;
      --tm-inspector: 360px;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --b3-theme-background: oklch(22.6% 0.009 238);
      --b3-theme-surface: oklch(26.8% 0.010 238);
      --b3-theme-surface-light: oklch(33.6% 0.012 238);
      --b3-theme-on-background: oklch(91% 0.010 238);
      --b3-theme-on-surface: oklch(85% 0.010 238);
      --b3-theme-on-surface-light: oklch(68% 0.012 238);
      --b3-theme-primary: oklch(68% 0.11 235);
      --b3-theme-primary-light: oklch(34% 0.045 235);
      --tm-success: oklch(67% 0.11 154);
      --tm-warning: oklch(72% 0.11 72);
      --tm-danger: oklch(68% 0.13 26);
      --tm-purple: oklch(70% 0.10 295);
      --tm-teal: oklch(70% 0.09 188);
      --tm-shadow: 0 18px 48px color-mix(in oklch, oklch(14% 0.01 238) 58%, transparent);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--tm-bg);
      color: var(--tm-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.45;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
    }

    .icon-sprite {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    .icon {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .prototype-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--tm-sidebar) minmax(0, 1fr) var(--tm-inspector);
      background: var(--tm-bg);
    }

    .sidebar,
    .inspector {
      min-width: 0;
      background: var(--tm-surface-2);
      display: flex;
      flex-direction: column;
    }

    .sidebar {
      border-right: 1px solid var(--tm-border-soft);
    }

    .inspector {
      border-left: 1px solid var(--tm-border-soft);
    }

    .panel-head {
      min-height: 54px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--tm-border-soft);
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: var(--tm-primary);
      color: oklch(96% 0.006 235);
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 1px color-mix(in oklch, oklch(95% 0.006 235) 18%, transparent);
    }

    .head-copy {
      min-width: 0;
      flex: 1 1 auto;
    }

    .head-title {
      display: block;
      font-weight: 730;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .head-subtitle {
      display: block;
      margin-top: 2px;
      color: var(--tm-muted);
      font-size: 12px;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .icon-button,
    .text-button,
    .segmented button,
    .group-row,
    .doc-row,
    .tab,
    .tab-menu-row,
    .chip-button {
      border: 1px solid var(--tm-border-soft);
      border-radius: 7px;
      background: var(--tm-surface);
      transition: background 150ms ease, border-color 150ms ease, color 150ms ease, box-shadow 150ms ease, transform 150ms ease;
    }

    .icon-button {
      width: 30px;
      height: 30px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .text-button,
    .chip-button {
      min-height: 30px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-weight: 650;
      white-space: nowrap;
    }

    .icon-button:hover,
    .text-button:hover,
    .segmented button:hover,
    .group-row:hover,
    .doc-row:hover,
    .tab:hover,
    .tab-menu-row:hover,
    .chip-button:hover {
      background: color-mix(in oklch, var(--tm-primary-soft) 54%, var(--tm-surface));
      border-color: color-mix(in oklch, var(--tm-primary) 28%, var(--tm-border));
    }

    .icon-button:focus-visible,
    .text-button:focus-visible,
    .segmented button:focus-visible,
    .group-row:focus-visible,
    .doc-row:focus-visible,
    .tab:focus-visible,
    .tab-menu-row:focus-visible,
    .chip-button:focus-visible,
    input:focus-visible {
      outline: 2px solid color-mix(in oklch, var(--tm-primary) 60%, transparent);
      outline-offset: 2px;
    }

    .sidebar-scroll,
    .inspector-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      scrollbar-gutter: stable;
    }

    .sidebar-scroll {
      padding: 12px 10px 16px;
    }

    .inspector-scroll {
      padding: 12px;
    }

    .section {
      display: grid;
      gap: 7px;
      margin-bottom: 18px;
    }

    .section-title {
      height: 24px;
      padding: 3px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--tm-muted);
      font-size: 12px;
      font-weight: 700;
    }

    .switch-row {
      min-height: 34px;
      padding: 7px 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--tm-border-soft);
      border-radius: var(--tm-radius);
      background: var(--tm-surface);
    }

    .switch-row span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .switch {
      position: relative;
      width: 34px;
      height: 20px;
      flex: 0 0 auto;
    }

    .switch input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .switch-track {
      position: absolute;
      inset: 0;
      border: 1px solid var(--tm-border);
      border-radius: 999px;
      background: var(--tm-surface-3);
    }

    .switch-track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--tm-muted);
      transition: transform 160ms ease, background 160ms ease;
    }

    .switch input:checked + .switch-track {
      background: color-mix(in oklch, var(--tm-primary) 18%, var(--tm-surface));
      border-color: color-mix(in oklch, var(--tm-primary) 44%, var(--tm-border));
    }

    .switch input:checked + .switch-track::after {
      transform: translateX(14px);
      background: var(--tm-primary);
    }

    .group-row,
    .doc-row {
      width: 100%;
      min-width: 0;
      padding: 8px 9px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
    }

    .group-row.is-selected {
      border-color: color-mix(in oklch, var(--tm-primary) 46%, var(--tm-border));
      background: color-mix(in oklch, var(--tm-primary-soft) 72%, var(--tm-surface));
      box-shadow: 0 0 0 2px color-mix(in oklch, var(--tm-primary) 10%, transparent);
    }

    .group-row-main,
    .doc-row-main {
      min-width: 0;
      flex: 1 1 auto;
      display: grid;
      gap: 2px;
    }

    .row-title {
      min-width: 0;
      font-weight: 690;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row-meta {
      min-width: 0;
      color: var(--tm-muted);
      font-size: 12px;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .count-badge,
    .kind-badge {
      min-width: 22px;
      height: 20px;
      padding: 0 7px;
      border: 1px solid var(--tm-border-soft);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--tm-muted);
      background: var(--tm-surface-3);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .kind-badge.is-custom {
      color: var(--tm-purple);
      background: color-mix(in oklch, var(--tm-purple) 11%, var(--tm-surface));
      border-color: color-mix(in oklch, var(--tm-purple) 30%, var(--tm-border));
    }

    .kind-badge.is-auto {
      color: var(--tm-teal);
      background: color-mix(in oklch, var(--tm-teal) 11%, var(--tm-surface));
      border-color: color-mix(in oklch, var(--tm-teal) 30%, var(--tm-border));
    }

    .workspace {
      min-width: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--tm-bg);
    }

    .topbar {
      min-height: 54px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--tm-border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--tm-surface);
    }

    .topbar-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .title-stack {
      min-width: 0;
    }

    .title-stack strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.16;
    }

    .title-stack span {
      display: block;
      margin-top: 2px;
      color: var(--tm-muted);
      font-size: 12px;
      line-height: 1.16;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topbar-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .segmented {
      height: 32px;
      padding: 3px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      border: 1px solid var(--tm-border-soft);
      border-radius: 8px;
      background: var(--tm-surface-2);
    }

    .segmented button {
      height: 24px;
      padding: 0 9px;
      border-color: transparent;
      background: transparent;
      color: var(--tm-muted);
      font-size: 12px;
      font-weight: 700;
    }

    .segmented button.is-active {
      color: var(--tm-primary);
      background: var(--tm-surface);
      border-color: color-mix(in oklch, var(--tm-primary) 28%, var(--tm-border));
      box-shadow: 0 1px 3px color-mix(in oklch, var(--tm-text) 7%, transparent);
    }

    .doc-tabs {
      position: relative;
      min-height: 42px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--tm-border-soft);
      background: var(--tm-surface);
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      overflow-y: visible;
      scrollbar-gutter: stable;
    }

    .tab {
      position: relative;
      height: 27px;
      max-width: 236px;
      padding: 0;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: stretch;
      overflow: hidden;
      color: var(--tm-text);
    }

    .tab.is-active {
      border-color: color-mix(in oklch, var(--tm-primary) 58%, var(--tm-border));
      box-shadow: inset 0 0 0 1px color-mix(in oklch, var(--tm-primary) 58%, transparent);
      background: color-mix(in oklch, var(--tm-primary-soft) 50%, var(--tm-surface));
    }

    .tab-main {
      min-width: 0;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 0;
      background: transparent;
      color: inherit;
    }

    .tab-main span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 640;
    }

    .tab-drop {
      width: 28px;
      min-width: 28px;
      border: 0;
      border-left: 1px solid var(--tm-border-soft);
      background: color-mix(in oklch, var(--tm-surface-2) 80%, transparent);
      color: var(--tm-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .tab-drop:hover {
      color: var(--tm-primary);
      background: color-mix(in oklch, var(--tm-primary-soft) 66%, var(--tm-surface));
    }

    .tab-mark {
      width: 7px;
      min-width: 7px;
      background: var(--tab-color, var(--tm-primary));
      opacity: 0.85;
    }

    .tab.is-custom .tab-mark {
      background: var(--tm-purple);
    }

    .tab.is-auto .tab-mark {
      background: var(--tm-teal);
    }

    .tab-count {
      height: 18px;
      min-width: 18px;
      padding: 0 5px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--tm-muted);
      background: var(--tm-surface-3);
      font-size: 11px;
      font-weight: 750;
    }

    .workspace-body {
      min-height: 0;
      flex: 1 1 auto;
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 14px;
      overflow: auto;
    }

    .task-surface,
    .rule-surface {
      min-width: 0;
      border: 1px solid var(--tm-border-soft);
      border-radius: var(--tm-radius);
      background: var(--tm-surface);
      overflow: hidden;
    }

    .surface-head {
      min-height: 42px;
      padding: 9px 11px;
      border-bottom: 1px solid var(--tm-border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .surface-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 730;
    }

    .surface-title span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-list {
      display: grid;
      gap: 0;
    }

    .task-row {
      min-height: 42px;
      padding: 8px 11px;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto;
      align-items: center;
      gap: 9px;
      border-bottom: 1px solid var(--tm-border-soft);
    }

    .task-row:last-child {
      border-bottom: 0;
    }

    .check {
      width: 16px;
      height: 16px;
      border: 1px solid var(--tm-border);
      border-radius: 4px;
      background: var(--tm-surface-2);
    }

    .task-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 620;
    }

    .task-meta {
      color: var(--tm-muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .rule-flow {
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .flow-step {
      min-height: 40px;
      padding: 8px 9px;
      display: flex;
      align-items: center;
      gap: 9px;
      border: 1px solid var(--tm-border-soft);
      border-radius: var(--tm-radius);
      background: var(--tm-surface-2);
    }

    .step-index {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--tm-primary);
      background: color-mix(in oklch, var(--tm-primary) 13%, var(--tm-surface));
      font-size: 12px;
      font-weight: 790;
      flex: 0 0 auto;
    }

    .step-copy {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .step-copy strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.15;
    }

    .step-copy span {
      color: var(--tm-muted);
      font-size: 12px;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .inspector-field {
      display: grid;
      gap: 6px;
      margin-bottom: 13px;
    }

    .inspector-field label {
      color: var(--tm-muted);
      font-size: 12px;
      font-weight: 700;
    }

    .input {
      width: 100%;
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--tm-border-soft);
      border-radius: 7px;
      background: var(--tm-surface);
    }

    .doc-pool {
      display: grid;
      gap: 6px;
    }

    .doc-row {
      min-height: 40px;
      padding: 7px 9px;
      background: var(--tm-surface);
    }

    .doc-row.is-member {
      border-color: color-mix(in oklch, var(--tm-primary) 42%, var(--tm-border));
      background: color-mix(in oklch, var(--tm-primary-soft) 58%, var(--tm-surface));
    }

    .doc-row.is-pinned {
      opacity: 0.82;
    }

    .mini-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--dot-color, var(--tm-primary));
      flex: 0 0 auto;
    }

    .menu-layer {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
    }

    .tab-menu {
      position: absolute;
      width: min(310px, calc(100vw - 16px));
      max-height: min(420px, calc(100vh - 16px));
      padding: 8px;
      border: 1px solid var(--tm-border);
      border-radius: 9px;
      background: var(--tm-surface);
      box-shadow: var(--tm-shadow);
      display: grid;
      gap: 5px;
      overflow: auto;
      pointer-events: auto;
    }

    .tab-menu-head {
      padding: 3px 4px 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--tm-muted);
      font-size: 12px;
      font-weight: 700;
    }

    .tab-menu-row {
      width: 100%;
      min-height: 36px;
      padding: 7px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
      background: var(--tm-surface-2);
    }

    .tab-menu-row.is-active {
      border-color: color-mix(in oklch, var(--tm-primary) 48%, var(--tm-border));
      background: color-mix(in oklch, var(--tm-primary-soft) 68%, var(--tm-surface));
    }

    .indent {
      width: 14px;
      flex: 0 0 auto;
    }

    .tab-menu-label {
      min-width: 0;
      flex: 1 1 auto;
      display: grid;
      gap: 2px;
    }

    .tab-menu-label strong,
    .tab-menu-label span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.15;
    }

    .tab-menu-label span {
      color: var(--tm-muted);
      font-size: 12px;
    }

    .empty-note {
      min-height: 54px;
      padding: 10px;
      display: grid;
      place-items: center;
      color: var(--tm-muted);
      font-size: 12px;
      border: 1px dashed var(--tm-border);
      border-radius: var(--tm-radius);
      background: color-mix(in oklch, var(--tm-surface) 74%, transparent);
    }

    .settings-layer {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      padding: 18px;
      background: color-mix(in oklch, var(--tm-text) 18%, transparent);
    }

    .settings-layer[hidden] {
      display: none;
    }

    .settings-modal {
      width: min(880px, 100%);
      height: min(680px, calc(100vh - 36px));
      border: 1px solid var(--tm-border);
      border-radius: 8px;
      background: var(--tm-surface);
      box-shadow: var(--tm-shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .settings-modal-head {
      min-height: 54px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--tm-border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .settings-modal-body {
      min-height: 0;
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
    }

    .settings-modal-side,
    .settings-modal-main {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      padding: 12px;
    }

    .settings-modal-side {
      border-right: 1px solid var(--tm-border-soft);
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .settings-modal-main {
      display: grid;
      align-content: start;
      gap: 10px;
    }

    @media (max-width: 1180px) {
      .prototype-shell {
        grid-template-columns: var(--tm-sidebar) minmax(0, 1fr);
      }

      .inspector {
        grid-column: 1 / -1;
        min-height: 420px;
        border-left: 0;
        border-top: 1px solid var(--tm-border-soft);
      }
    }

    @media (max-width: 840px) {
      .prototype-shell {
        display: flex;
        flex-direction: column;
      }

      .sidebar,
      .workspace,
      .inspector {
        min-height: auto;
      }

      .topbar,
      .panel-head {
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .topbar-actions {
        width: 100%;
        justify-content: space-between;
      }

      .workspace-body {
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .settings-modal {
        height: calc(100vh - 20px);
      }

      .settings-modal-body {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .settings-modal-side {
        border-right: 0;
        border-bottom: 1px solid var(--tm-border-soft);
        max-height: 190px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true">
    <symbol id="i-layers" viewBox="0 0 24 24"><path d="M12 3 3 8l9 5 9-5-9-5Z"></path><path d="m3 13 9 5 9-5"></path><path d="m3 18 9 5 9-5"></path></symbol>
    <symbol id="i-folder" viewBox="0 0 24 24"><path d="M3 6.5h6l2 2h10v9.5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6.5Z"></path></symbol>
    <symbol id="i-file" viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7V3Z"></path><path d="M14 3v5h5"></path></symbol>
    <symbol id="i-chevron" viewBox="0 0 24 24"><path d="m8 10 4 4 4-4"></path></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></symbol>
    <symbol id="i-pin" viewBox="0 0 24 24"><path d="m14 4 6 6-4 1-5 5-3-3 5-5 1-4Z"></path><path d="m4 20 5-5"></path></symbol>
    <symbol id="i-eye-off" viewBox="0 0 24 24"><path d="M3 3l18 18"></path><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path><path d="M9.5 5.2A9.4 9.4 0 0 1 12 5c5 0 8 5 8 5a13.2 13.2 0 0 1-2.1 2.8"></path><path d="M6.1 6.7C4.8 7.6 3.8 8.8 3 10c0 0 3 5 9 5a9.8 9.8 0 0 0 3.2-.5"></path></symbol>
    <symbol id="i-sun" viewBox="0 0 24 24"><path d="M12 4V2"></path><path d="M12 22v-2"></path><path d="M4.9 4.9 3.5 3.5"></path><path d="m20.5 20.5-1.4-1.4"></path><path d="M4 12H2"></path><path d="M22 12h-2"></path><path d="m4.9 19.1-1.4 1.4"></path><path d="m20.5 3.5-1.4 1.4"></path><circle cx="12" cy="12" r="4"></circle></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="m5 12 4 4 10-10"></path></symbol>
  </svg>

  <div class="prototype-shell">
    <aside class="sidebar">
      <div class="panel-head">
        <div class="brand-mark"><svg class="icon"><use href="#i-layers"></use></svg></div>
        <div class="head-copy">
          <span class="head-title">页签分组</span>
          <span class="head-subtitle">自定义组 + 子文档可选</span>
        </div>
        <button class="icon-button" id="themeButton" type="button" aria-label="切换主题">
          <svg class="icon"><use href="#i-sun"></use></svg>
        </button>
      </div>
      <div class="sidebar-scroll">
        <section class="section">
          <div class="section-title">策略</div>
          <div class="switch-row">
            <span>仅自定义组收纳页签</span>
            <span class="kind-badge is-custom">显式</span>
          </div>
          <div class="switch-row">
            <span>父子关系只辅助选择</span>
            <span class="kind-badge is-auto">树形</span>
          </div>
          <div class="switch-row">
            <span>勾选后才包含子文档</span>
            <span class="kind-badge">可选</span>
          </div>
        </section>

        <section class="section">
          <div class="section-title">
            <span>自定义组</span>
            <button class="icon-button" id="addGroupButton" type="button" aria-label="新建自定义组">
              <svg class="icon"><use href="#i-plus"></use></svg>
            </button>
          </div>
          <div id="customGroupList"></div>
        </section>

        <section class="section">
          <div class="section-title">固定页签</div>
          <button class="group-row" type="button" data-pin-doc="inbox">
            <svg class="icon"><use href="#i-pin"></use></svg>
            <span class="group-row-main">
              <span class="row-title">收集箱</span>
              <span class="row-meta">置顶，不参与隐藏</span>
            </span>
            <span class="count-badge">12</span>
          </button>
        </section>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="topbar-title">
          <svg class="icon"><use href="#i-folder"></use></svg>
          <div class="title-stack">
            <strong id="workspaceTitle">发布准备</strong>
            <span id="workspaceSubtitle">自定义组优先，当前文档：回归记录</span>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="segmented" role="tablist" aria-label="分组视图">
            <button type="button" class="is-active" data-view="mixed">页签</button>
            <button type="button" data-view="auto">文档树</button>
            <button type="button" data-view="custom">自定义</button>
          </div>
          <button class="text-button" id="openSettingsButton" type="button">
            <svg class="icon"><use href="#i-layers"></use></svg>
            <span>管理页签分组</span>
          </button>
          <button class="text-button" id="expandAllButton" type="button">
            <svg class="icon"><use href="#i-eye-off"></use></svg>
            <span>普通页签全显示</span>
          </button>
        </div>
      </header>

      <nav class="doc-tabs" id="tabStrip" aria-label="文档页签"></nav>

      <section class="workspace-body">
        <div class="task-surface">
          <div class="surface-head">
            <div class="surface-title">
              <svg class="icon"><use href="#i-file"></use></svg>
              <span id="taskSurfaceTitle">回归记录</span>
            </div>
            <span class="kind-badge" id="activeKindBadge">自定义组</span>
          </div>
          <div class="task-list" id="taskList"></div>
        </div>

        <div class="rule-surface">
          <div class="surface-head">
            <div class="surface-title">
              <svg class="icon"><use href="#i-layers"></use></svg>
              <span>解析顺序</span>
            </div>
          </div>
          <div class="rule-flow">
            <div class="flow-step">
              <span class="step-index">1</span>
              <span class="step-copy">
                <strong>固定页签</strong>
                <span>置顶文档保持独立</span>
              </span>
            </div>
            <div class="flow-step">
              <span class="step-index">2</span>
              <span class="step-copy">
                <strong>自定义组</strong>
                <span>显式成员优先覆盖</span>
              </span>
            </div>
            <div class="flow-step">
              <span class="step-index">3</span>
              <span class="step-copy">
                <strong>子文档选择</strong>
                <span>编辑自定义组时显示树形关系</span>
              </span>
            </div>
            <div class="flow-step">
              <span class="step-index">4</span>
              <span class="step-copy">
                <strong>包含子文档</strong>
                <span>只有勾选后才递归加入</span>

    </main>

    <aside class="inspector">
      <div class="panel-head">
        <svg class="icon"><use href="#i-layers"></use></svg>
        <div class="head-copy">
          <span class="head-title">自定义组编辑</span>
          <span class="head-subtitle" id="inspectorSubtitle">发布准备，4 个成员</span>
        </div>
      </div>
      <div class="inspector-scroll">
        <div class="inspector-field">
          <label for="groupNameInput">组名</label>
          <input class="input" id="groupNameInput" type="text">
        </div>
        <div class="inspector-field">
          <label>成员</label>
          <div class="doc-pool" id="docPool"></div>
        </div>
      </div>
    </aside>
  </div>

  <div class="menu-layer" id="menuLayer"></div>
  <div class="settings-layer" id="settingsLayer" hidden>
    <section class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-modal-head">
        <div class="head-copy">
          <span class="head-title" id="settingsTitle">页签分组设置</span>
          <span class="head-subtitle">勾选当前文档分组页签，按需包含子文档</span>
        </div>
        <button class="text-button" id="closeSettingsButton" type="button">关闭</button>
      </div>
      <div class="settings-modal-body">
        <aside class="settings-modal-side">
          <button class="text-button" id="modalAddGroupButton" type="button">
            <svg class="icon"><use href="#i-plus"></use></svg>
            <span>新建页签组</span>
          </button>
          <div id="modalGroupList"></div>
        </aside>
        <main class="settings-modal-main">
          <div class="inspector-field">
            <label for="modalGroupNameInput">组名</label>
            <input class="input" id="modalGroupNameInput" type="text">
          </div>
          <div class="inspector-field">
            <label>当前文档分组页签</label>
            <div class="doc-pool" id="modalDocPool"></div>
          </div>
        </main>
      </div>
    </section>
  </div>

  <script>
    const docs = [
      { id: "inbox", name: "收集箱", path: "任务/收集箱", parentId: "", tasks: 12, pinned: true, color: "oklch(58% 0.13 235)" },
      { id: "project", name: "项目计划", path: "项目/项目计划", parentId: "", tasks: 18, color: "oklch(55% 0.13 235)" },
      { id: "scope", name: "范围定义", path: "项目/项目计划/范围定义", parentId: "project", tasks: 9, color: "oklch(58% 0.10 188)" },
      { id: "wireframe", name: "界面草案", path: "项目/项目计划/界面草案", parentId: "project", tasks: 14, color: "oklch(61% 0.12 295)" },
      { id: "release", name: "发布准备", path: "发布/发布准备", parentId: "", tasks: 21, color: "oklch(58% 0.12 154)" },
      { id: "qa", name: "回归记录", path: "发布/发布准备/回归记录", parentId: "release", tasks: 11, color: "oklch(64% 0.13 72)" },
      { id: "smoke", name: "冒烟用例", path: "发布/发布准备/回归记录/冒烟用例", parentId: "qa", tasks: 6, color: "oklch(60% 0.12 94)" },
      { id: "notes", name: "发布说明", path: "发布/发布准备/发布说明", parentId: "release", tasks: 7, color: "oklch(58% 0.15 26)" },
      { id: "meeting", name: "周会记录", path: "管理/周会记录", parentId: "", tasks: 5, color: "oklch(58% 0.10 188)" },
      { id: "research", name: "资料调研", path: "研究/资料调研", parentId: "", tasks: 16, color: "oklch(56% 0.11 262)" },
      { id: "experiment", name: "实验记录", path: "研究/资料调研/实验记录", parentId: "research", tasks: 8, color: "oklch(58% 0.12 295)" }
    ];

    const taskSamples = {
      inbox: ["处理临时收件任务", "归档已完成记录", "确认今天新增事项"],
      project: ["确定本周任务范围", "更新项目状态", "整理延期原因"],
      scope: ["核对范围边界", "补充验收条件", "同步需求变更"],
      wireframe: ["检查页签折叠态", "确认移动端下拉", "回收无效状态"],
      release: ["冻结发布清单", "确认版本说明", "准备回滚步骤"],
      qa: ["复测页签拖拽", "验证父子默认分组", "检查归档页签显示"],
      smoke: ["运行登录链路", "检查移动端折叠", "确认菜单定位"],
      notes: ["更新变更列表", "补充已知问题", "压缩说明文案"],
      meeting: ["整理决策项", "分派后续任务", "同步风险清单"],
      research: ["筛选引用资料", "归纳方案差异", "标注可复用片段"],
      experiment: ["记录对照结果", "保存截图证据", "标出下一步假设"]
    };

    const state = {
      view: "mixed",
      activeDocId: "qa",
      selectedGroupId: "launch",
      menuGroupId: "",
      contextDocId: "",
      contextX: 0,
      contextY: 0,
      customGroups: [
        { id: "launch", name: "发布准备", entries: [{ id: "release", includeChildren: true }, { id: "meeting", includeChildren: false }] },
        { id: "design", name: "设计收束", entries: [{ id: "project", includeChildren: true }] },
        { id: "study", name: "研究材料", entries: [{ id: "research", includeChildren: false }, { id: "experiment", includeChildren: false }] }
      ]
    };

    const byId = new Map(docs.map((doc) => [doc.id, doc]));

    function icon(name) {
      return '<svg class="icon"><use href="#i-' + name + '"></use></svg>';
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[ch]));
    }

    function getDescendants(rootId, sourceDocs) {
      const ids = [];
      const queue = sourceDocs.filter((doc) => doc.parentId === rootId).map((doc) => doc.id);
      while (queue.length) {
        const id = queue.shift();
        const doc = byId.get(id);
        if (!doc) continue;
        ids.push(id);
        sourceDocs.filter((item) => item.parentId === id).forEach((item) => queue.push(item.id));
      }
      return ids;
    }

    function getEntryIds(entry) {
      const id = String(entry?.id || "").trim();
      if (!id || !byId.has(id)) return [];
      const base = [id];
      if (entry?.includeChildren) {
        base.push(...getDescendants(id, docs));
      }
      return Array.from(new Set(base)).filter((docId) => byId.has(docId));
    }

    function getGroupMemberIds(group) {
      const entries = Array.isArray(group?.entries) ? group.entries : [];
      const out = [];
      const seen = new Set();
      entries.forEach((entry) => {
        getEntryIds(entry).forEach((id) => {
          if (seen.has(id)) return;
          seen.add(id);
          out.push(id);
        });
      });
      return out;
    }

    function hasDirectEntry(group, docId) {
      const id = String(docId || "").trim();
      return (Array.isArray(group?.entries) ? group.entries : []).some((entry) => String(entry?.id || "").trim() === id);
    }

    function getDirectEntry(group, docId) {
      const id = String(docId || "").trim();
      return (Array.isArray(group?.entries) ? group.entries : []).find((entry) => String(entry?.id || "").trim() === id) || null;
    }

    function addGroupEntry(group, docId, includeChildren = false) {
      if (!group || !byId.has(docId)) return;
      const current = Array.isArray(group.entries) ? group.entries : [];
      const existing = current.find((entry) => String(entry?.id || "").trim() === docId);
      if (existing) {
        existing.includeChildren = !!(existing.includeChildren || includeChildren);
      } else {
        group.entries = [...current, { id: docId, includeChildren: !!includeChildren }];
      }
    }

    function removeGroupEntry(group, docId) {
      if (!group) return;
      group.entries = (Array.isArray(group.entries) ? group.entries : []).filter((entry) => String(entry?.id || "").trim() !== docId);
    }

    function getCustomMemberSet() {
      const set = new Set();
      if (state.view === "auto") return set;
      state.customGroups.forEach((group) => getGroupMemberIds(group).forEach((id) => set.add(id)));
      return set;
    }

    function buildTabModels() {
      const allDocs = docs.slice();
      const pinned = allDocs.filter((doc) => doc.pinned);
      const rest = allDocs.filter((doc) => !doc.pinned);
      const tabs = pinned.map((doc) => ({
        id: "doc:" + doc.id,
        kind: "single",
        label: doc.name,
        displayDocId: doc.id,
        docs: [doc.id],
        color: doc.color
      }));

      if (state.view !== "auto") {
        state.customGroups.forEach((group) => {
          const memberIds = getGroupMemberIds(group).filter((id) => byId.has(id) && !byId.get(id).pinned);
          if (!memberIds.length) return;
          const aggregateId = "group:" + group.id;
          const activeInside = memberIds.includes(state.activeDocId);
          const aggregateActive = state.activeDocId === aggregateId;
          const displayDocId = activeInside ? state.activeDocId : memberIds[0];
          tabs.push({
            id: "custom:" + group.id,
            kind: "custom",
            label: group.name,
            groupName: group.name,
            aggregateId,
            aggregateActive,
            displayDocId,
            docs: memberIds,
            color: "var(--tm-purple)"
          });
        });
      }

      const claimed = getCustomMemberSet();
      const plainDocs = state.view === "auto" ? getDocsInTreeOrder().filter((doc) => !doc.pinned) : rest;
      plainDocs.filter((doc) => state.view !== "custom" || !claimed.has(doc.id)).forEach((doc) => {
        tabs.push({
          id: "doc:" + doc.id,
          kind: "single",
          label: doc.name,
          displayDocId: doc.id,
          docs: [doc.id],
          color: doc.color
        });
      });

      return tabs;
    }

    function getActiveTab(tabs) {
      return tabs.find((tab) => tab.docs.includes(state.activeDocId) || tab.aggregateId === state.activeDocId) || tabs[0] || null;
    }

    function renderSidebar() {
      document.getElementById("customGroupList").innerHTML = state.customGroups.map((group) => {
        const memberIds = getGroupMemberIds(group);
        const count = memberIds.filter((id) => byId.has(id)).length;
        const names = memberIds.map((id) => byId.get(id)?.name).filter(Boolean).slice(0, 3).join("、");
        return '<button class="group-row ' + (state.selectedGroupId === group.id ? "is-selected" : "") + '" type="button" data-select-group="' + esc(group.id) + '">' +
          icon("layers") +
          '<span class="group-row-main"><span class="row-title">' + esc(group.name) + '</span><span class="row-meta">' + esc(names || "暂无成员") + '</span></span>' +
          '<span class="count-badge">' + count + '</span>' +
        '</button>';
      }).join("");
    }

    function renderTabs() {
      const tabs = buildTabModels();
      const html = tabs.map((tab) => {
        const active = tab.docs.includes(state.activeDocId) || tab.aggregateId === state.activeDocId;
        const doc = byId.get(tab.displayDocId);
        const canDrop = tab.docs.length > 1;
        const kindClass = tab.kind === "custom" ? " is-custom" : (tab.kind === "auto" ? " is-auto" : "");
        const label = tab.kind === "custom" ? tab.label : (doc?.name || tab.label);
        return '<div class="tab' + (active ? " is-active" : "") + kindClass + '" style="--tab-color:' + esc(tab.color || "var(--tm-primary)") + '" data-tab-id="' + esc(tab.id) + '" data-context-doc="' + esc(tab.displayDocId) + '">' +
          '<span class="tab-mark"></span>' +
          '<button class="tab-main" type="button" ' + (tab.kind === "custom" ? 'data-open-group-all="' + esc(tab.id) + '"' : 'data-open-doc="' + esc(tab.displayDocId) + '"') + '>' +
            icon(tab.kind === "custom" || tab.kind === "auto" ? "folder" : "file") +
            '<span>' + esc(label) + '</span>' +
            (canDrop ? '<span class="tab-count">' + tab.docs.length + '</span>' : "") +
          '</button>' +
          (canDrop ? '<button class="tab-drop" type="button" data-menu-tab="' + esc(tab.id) + '" aria-label="展开组">' + icon("chevron") + '</button>' : "") +
        '</div>';
      }).join("");
      document.getElementById("tabStrip").innerHTML = html;
      renderMenuIfNeeded();
      updateWorkspaceHeader(tabs);
    }

    function getDepthInTab(docId, tabDocs) {
      const docSet = new Set(tabDocs);
      let depth = 0;
      let current = byId.get(docId);
      const seen = new Set();
      while (current?.parentId && docSet.has(current.parentId) && !seen.has(current.parentId)) {
        seen.add(current.parentId);
        depth += 1;
        current = byId.get(current.parentId);
      }
      return depth;
    }

    function renderMenuIfNeeded() {
      const layer = document.getElementById("menuLayer");
      layer.innerHTML = "";
      if (state.contextDocId) {
        renderContextMenu(layer);
        return;
      }
      if (!state.menuGroupId) return;
      const tabs = buildTabModels();
      const tab = tabs.find((item) => item.id === state.menuGroupId);
      const anchor = document.querySelector('[data-tab-id="' + CSS.escape(state.menuGroupId) + '"]');
      if (!tab || !anchor) return;
      const rect = anchor.getBoundingClientRect();
      const x = Math.min(Math.max(8, rect.left), window.innerWidth - 318);
      const y = Math.min(Math.max(8, rect.bottom + 6), window.innerHeight - 430);
      const rows = tab.docs.map((id) => {
        const doc = byId.get(id);
        if (!doc) return "";
        const depth = getDepthInTab(id, tab.docs);
        const meta = depth ? "由包含子文档加入" : "自定义成员";
        return '<button class="tab-menu-row ' + (id === state.activeDocId ? "is-active" : "") + '" type="button" data-switch-doc="' + esc(id) + '">' +
          (depth ? '<span class="indent" style="width:' + (14 * depth) + 'px"></span>' : icon("file")) +
          '<span class="mini-dot" style="--dot-color:' + esc(doc.color) + '"></span>' +
          '<span class="tab-menu-label"><strong>' + esc(doc.name) + '</strong><span>' + esc(meta + " / " + doc.tasks + " 任务") + '</span></span>' +
          (id === state.activeDocId ? '<span class="kind-badge">当前</span>' : "") +
        '</button>';
      }).join("");
      layer.innerHTML = '<div class="tab-menu" style="left:' + x + 'px;top:' + y + 'px">' +
        '<div class="tab-menu-head"><span>' + esc(tab.groupName || tab.label) + '</span><span>' + tab.docs.length + ' 项</span></div>' +
        rows +
      '</div>';
    }

    function renderContextMenu(layer) {
      const doc = byId.get(state.contextDocId);
      if (!doc) return;
      const x = Math.min(Math.max(8, state.contextX || 8), window.innerWidth - 318);
      const y = Math.min(Math.max(8, state.contextY || 8), window.innerHeight - 430);
      const groupRows = state.customGroups.map((group) => {
        const isMember = getGroupMemberIds(group).includes(doc.id);
        const direct = hasDirectEntry(group, doc.id);
        return '<button class="tab-menu-row ' + (isMember ? "is-active" : "") + '" type="button" data-' + (direct ? "remove" : "add") + '-doc-group="' + esc(group.id) + '">' +
          icon(isMember ? "check" : "folder") +
          '<span class="tab-menu-label"><strong>' + esc(group.name) + '</strong><span>' + (isMember ? (direct ? "已直接加入，点击移除" : "由父文档包含，编辑组可调整") : "加入此自定义组") + '</span></span>' +
        '</button>';
      }).join("");
      layer.innerHTML = '<div class="tab-menu" style="left:' + x + 'px;top:' + y + 'px">' +
        '<div class="tab-menu-head"><span>' + esc(doc.name) + '</span><span>页签操作</span></div>' +
        '<button class="tab-menu-row" type="button" data-open-doc="' + esc(doc.id) + '">' +
          icon("file") +
          '<span class="tab-menu-label"><strong>切换到此文档</strong><span>' + esc(doc.path) + '</span></span>' +
        '</button>' +
        '<button class="tab-menu-row" type="button" data-create-group-with-doc="' + esc(doc.id) + '">' +
          icon("plus") +
          '<span class="tab-menu-label"><strong>新建自定义组</strong><span>创建后自动加入当前页签</span></span>' +
        '</button>' +
        '<div class="tab-menu-head"><span>加入已有分组</span><span>' + state.customGroups.length + ' 组</span></div>' +
        (groupRows || '<div class="empty-note">暂无自定义组</div>') +
      '</div>';
    }

    function updateWorkspaceHeader(tabs) {
      const active = getActiveTab(tabs);
      const aggregate = active?.aggregateId && state.activeDocId === active.aggregateId;
      const doc = aggregate ? null : (byId.get(state.activeDocId) || byId.get(active?.displayDocId || ""));
      const title = active?.groupName || doc?.name || "全部文档";
      const kind = active?.kind === "custom" ? "自定义组" : "独立页签";
      document.getElementById("workspaceTitle").textContent = title;
      document.getElementById("workspaceSubtitle").textContent = aggregate ? kind + "，当前：组内全部" : kind + "，当前文档：" + (doc?.name || "未选择");
      document.getElementById("taskSurfaceTitle").textContent = aggregate ? "组内全部" : (doc?.name || "未选择");
      const badge = document.getElementById("activeKindBadge");
      badge.textContent = kind;
      badge.className = "kind-badge " + (active?.kind === "custom" ? "is-custom" : (active?.kind === "auto" ? "is-auto" : ""));
    }

    function renderTasks() {
      const tabs = buildTabModels();
      const active = getActiveTab(tabs);
      const aggregate = active?.aggregateId && state.activeDocId === active.aggregateId;
      const doc = aggregate ? null : (byId.get(state.activeDocId) || docs[0]);
      const items = aggregate
        ? active.docs.flatMap((id) => (taskSamples[id] || []).slice(0, 2)).slice(0, 8)
        : (taskSamples[doc.id] || taskSamples.project);
      document.getElementById("taskList").innerHTML = items.map((name, index) => {
        const tag = index === 0 ? "今天" : (index === 1 ? "本周" : "待处理");
        return '<div class="task-row"><span class="check"></span><span class="task-name">' + esc(name) + '</span><span class="task-meta">' + esc(tag) + '</span></div>';
      }).join("");
    }

    function selectedGroup() {
      return state.customGroups.find((group) => group.id === state.selectedGroupId) || state.customGroups[0] || null;
    }

    function getDocDepth(docId) {
      let depth = 0;
      let current = byId.get(docId);
      const seen = new Set();
      while (current?.parentId && byId.has(current.parentId) && !seen.has(current.parentId)) {
        seen.add(current.parentId);
        depth += 1;
        current = byId.get(current.parentId);
      }
      return depth;
    }

    function getDocsInTreeOrder() {
      const roots = docs.filter((doc) => !doc.parentId || !byId.has(doc.parentId));
      const out = [];
      const visit = (doc) => {
        out.push(doc);
        docs.filter((item) => item.parentId === doc.id).forEach(visit);
      };
      roots.forEach(visit);
      return out;
    }

    function renderInspector() {
      const group = selectedGroup();
      const nameInput = document.getElementById("groupNameInput");
      if (!group) {
        document.getElementById("inspectorSubtitle").textContent = "暂无自定义组";
        nameInput.value = "";
        document.getElementById("docPool").innerHTML = '<div class="empty-note">暂无可编辑分组</div>';
        return;
      }
      nameInput.value = group.name;
      const memberIds = getGroupMemberIds(group);
      document.getElementById("inspectorSubtitle").textContent = group.name + "，" + memberIds.length + " 个页签";
      const rows = getDocsInTreeOrder().filter((doc) => !doc.pinned).map((doc) => {
        const directEntry = getDirectEntry(group, doc.id);
        const direct = !!directEntry;
        const member = memberIds.includes(doc.id);
        const hasChildren = getDescendants(doc.id, docs).length > 0;
        const depth = getDocDepth(doc.id);
        return '<div class="doc-row ' + (member ? "is-member" : "") + '" style="padding-left:' + (9 + depth * 16) + 'px">' +
          '<span class="mini-dot" style="--dot-color:' + esc(doc.color) + '"></span>' +
          '<span class="doc-row-main"><span class="row-title">' + esc(doc.name) + '</span><span class="row-meta">' + esc(doc.path) + '</span></span>' +
          (hasChildren ? '<button class="chip-button" type="button" data-toggle-children="' + esc(doc.id) + '">' + (directEntry?.includeChildren ? "含子文档" : "不含子文档") + '</button>' : '') +
          '<button class="chip-button" type="button" data-toggle-member="' + esc(doc.id) + '">' + (direct ? "移除" : (member ? "继承" : "加入")) + '</button>' +
        '</div>';
      }).join("");
      document.getElementById("docPool").innerHTML = rows;
    }

    function renderSettingsModal() {
      const groupList = document.getElementById("modalGroupList");
      const nameInput = document.getElementById("modalGroupNameInput");
      const docPool = document.getElementById("modalDocPool");
      if (!groupList || !nameInput || !docPool) return;
      groupList.innerHTML = state.customGroups.map((group) => {
        const memberIds = getGroupMemberIds(group);
        return '<button class="group-row ' + (state.selectedGroupId === group.id ? "is-selected" : "") + '" type="button" data-select-group="' + esc(group.id) + '">' +
          icon("layers") +
          '<span class="group-row-main"><span class="row-title">' + esc(group.name) + '</span><span class="row-meta">' + memberIds.length + ' 个页签</span></span>' +
          '<span class="count-badge">' + memberIds.length + '</span>' +
        '</button>';
      }).join("") || '<div class="empty-note">暂无页签组</div>';

      const group = selectedGroup();
      if (!group) {
        nameInput.value = "";
        docPool.innerHTML = '<div class="empty-note">先新建一个页签组</div>';
        return;
      }
      nameInput.value = group.name;
      const memberIds = getGroupMemberIds(group);
      docPool.innerHTML = getDocsInTreeOrder().filter((doc) => !doc.pinned).map((doc) => {
        const directEntry = getDirectEntry(group, doc.id);
        const direct = !!directEntry;
        const member = memberIds.includes(doc.id);
        const children = getDescendants(doc.id, docs).filter((child) => !child.pinned);
        const depth = getDocDepth(doc.id);
        const childText = children.length ? "子文档 " + children.map((child) => child.name).slice(0, 3).join("、") : "当前没有子文档";
        return '<div class="doc-row ' + (member ? "is-member" : "") + '" style="padding-left:' + (9 + depth * 16) + 'px">' +
          '<label class="switch" title="直接加入页签组"><input type="checkbox" data-toggle-member="' + esc(doc.id) + '" ' + (direct ? "checked" : "") + '><span class="switch-track"></span></label>' +
          '<span class="mini-dot" style="--dot-color:' + esc(doc.color) + '"></span>' +
          '<span class="doc-row-main"><span class="row-title">' + esc(doc.name) + (member && !direct ? " · 由父文档带入" : "") + '</span><span class="row-meta">' + esc(childText) + '</span></span>' +
          '<button class="chip-button" type="button" data-toggle-children="' + esc(doc.id) + '" ' + (!direct ? "disabled" : "") + '>' + (directEntry?.includeChildren ? "包含子文档" : "不包含子文档") + '</button>' +
        '</div>';
      }).join("");
    }

    function renderAll() {
      renderSidebar();
      renderTabs();
      renderTasks();
      renderInspector();
      renderSettingsModal();
    }

    function bindEvents() {
      document.addEventListener("click", (event) => {
        const target = event.target;
        const selectGroup = target.closest?.("[data-select-group]");
        if (selectGroup) {
          state.selectedGroupId = selectGroup.getAttribute("data-select-group");
          state.contextDocId = "";
          renderAll();
          return;
        }
        const openDoc = target.closest?.("[data-open-doc]");
        if (openDoc) {
          state.activeDocId = openDoc.getAttribute("data-open-doc");
          state.menuGroupId = "";
          state.contextDocId = "";
          renderAll();
          return;
        }
        const openGroupAll = target.closest?.("[data-open-group-all]");
        if (openGroupAll) {
          const tabId = openGroupAll.getAttribute("data-open-group-all") || "";
          const groupId = tabId.replace(/^custom:/, "");
          if (groupId) state.activeDocId = "group:" + groupId;
          state.menuGroupId = "";
          state.contextDocId = "";
          renderAll();
          return;
        }
        const menuTab = target.closest?.("[data-menu-tab]");
        if (menuTab) {
          const id = menuTab.getAttribute("data-menu-tab");
          state.menuGroupId = state.menuGroupId === id ? "" : id;
          state.contextDocId = "";
          renderTabs();
          return;
        }
        const switchDoc = target.closest?.("[data-switch-doc]");
        if (switchDoc) {
          state.activeDocId = switchDoc.getAttribute("data-switch-doc");
          state.menuGroupId = "";
          state.contextDocId = "";
          renderAll();
          return;
        }
        const createGroupWithDoc = target.closest?.("[data-create-group-with-doc]");
        if (createGroupWithDoc) {
          const docId = createGroupWithDoc.getAttribute("data-create-group-with-doc");
          const doc = byId.get(docId);
          if (doc) {
            const id = "custom-" + Math.round(Date.now());
            state.customGroups.push({ id, name: doc.name + "组", entries: [{ id: doc.id, includeChildren: false }] });
            state.selectedGroupId = id;
            state.contextDocId = "";
            state.menuGroupId = "";
            renderAll();
          }
          return;
        }
        const addDocGroup = target.closest?.("[data-add-doc-group]");
        if (addDocGroup && state.contextDocId) {
          const group = state.customGroups.find((item) => item.id === addDocGroup.getAttribute("data-add-doc-group"));
          addGroupEntry(group, state.contextDocId, false);
          state.contextDocId = "";
          renderAll();
          return;
        }
        const removeDocGroup = target.closest?.("[data-remove-doc-group]");
        if (removeDocGroup && state.contextDocId) {
          const group = state.customGroups.find((item) => item.id === removeDocGroup.getAttribute("data-remove-doc-group"));
          removeGroupEntry(group, state.contextDocId);
          state.contextDocId = "";
          renderAll();
          return;
        }
        const toggleMember = target.closest?.("[data-toggle-member]");
        if (toggleMember) {
          const group = selectedGroup();
          const id = toggleMember.getAttribute("data-toggle-member");
          if (group && id) {
            if (hasDirectEntry(group, id)) removeGroupEntry(group, id);
            else addGroupEntry(group, id, false);
            const memberIds = getGroupMemberIds(group);
            if (!memberIds.includes(state.activeDocId) && memberIds.length) state.activeDocId = memberIds[0];
            renderAll();
          }
          return;
        }
        const toggleChildren = target.closest?.("[data-toggle-children]");
        if (toggleChildren) {
          const group = selectedGroup();
          const id = toggleChildren.getAttribute("data-toggle-children");
          if (group && id) {
            const entry = getDirectEntry(group, id);
            if (entry) entry.includeChildren = !entry.includeChildren;
            else addGroupEntry(group, id, true);
            renderAll();
          }
          return;
        }
        const pinDoc = target.closest?.("[data-pin-doc]");
        if (pinDoc) {
          state.activeDocId = pinDoc.getAttribute("data-pin-doc");
          state.menuGroupId = "";
          state.contextDocId = "";
          renderAll();
          return;
        }
        if (!target.closest?.(".tab-menu") && !target.closest?.("[data-menu-tab]")) {
          if (state.menuGroupId || state.contextDocId) {
            state.menuGroupId = "";
            state.contextDocId = "";
            renderTabs();
          }
        }
      });

      document.addEventListener("contextmenu", (event) => {
        const tab = event.target.closest?.("[data-context-doc]");
        if (!tab) return;
        event.preventDefault();
        const tabId = tab.getAttribute("data-tab-id") || "";
        if (tabId.startsWith("custom:")) {
          state.selectedGroupId = tabId.replace(/^custom:/, "");
          state.contextDocId = "";
          state.menuGroupId = "";
          document.getElementById("settingsLayer").hidden = false;
          renderAll();
          return;
        }
        state.contextDocId = tab.getAttribute("data-context-doc") || "";
        state.contextX = event.clientX;
        state.contextY = event.clientY;
        state.menuGroupId = "";
        renderTabs();
      });

      document.querySelectorAll(".segmented button").forEach((button) => {
        button.addEventListener("click", () => {
          state.view = button.getAttribute("data-view");
          document.querySelectorAll(".segmented button").forEach((item) => item.classList.toggle("is-active", item === button));
          state.menuGroupId = "";
          state.contextDocId = "";
          renderAll();
        });
      });

      document.getElementById("expandAllButton").addEventListener("click", () => {
        state.contextDocId = "";
        state.view = "custom";
        document.querySelectorAll(".segmented button").forEach((item) => item.classList.toggle("is-active", item.getAttribute("data-view") === "custom"));
        renderAll();
        document.getElementById("groupNameInput").focus();
      });
      document.getElementById("openSettingsButton").addEventListener("click", () => {
        state.contextDocId = "";
        state.menuGroupId = "";
        document.getElementById("settingsLayer").hidden = false;
        renderAll();
        document.getElementById("modalGroupNameInput").focus();
      });
      document.getElementById("closeSettingsButton").addEventListener("click", () => {
        document.getElementById("settingsLayer").hidden = true;
      });
      document.getElementById("settingsLayer").addEventListener("click", (event) => {
        if (event.target.id === "settingsLayer") event.currentTarget.hidden = true;
      });
      document.getElementById("addGroupButton").addEventListener("click", () => {
        const id = "custom-" + Math.round(Date.now());
        state.customGroups.push({ id, name: "新建分组", entries: [] });
        state.selectedGroupId = id;
        renderAll();
        document.getElementById("groupNameInput").focus();
      });
      document.getElementById("modalAddGroupButton").addEventListener("click", () => {
        const id = "custom-" + Math.round(Date.now());
        state.customGroups.push({ id, name: "新建分组", entries: [] });
        state.selectedGroupId = id;
        renderAll();
        document.getElementById("modalGroupNameInput").focus();
      });
      document.getElementById("groupNameInput").addEventListener("input", (event) => {
        const group = selectedGroup();
        if (!group) return;
        group.name = event.target.value.trim() || "未命名分组";
        renderSidebar();
        renderTabs();
      });
      document.getElementById("modalGroupNameInput").addEventListener("input", (event) => {
        const group = selectedGroup();
        if (!group) return;
        group.name = event.target.value.trim() || "未命名分组";
        renderAll();
        document.getElementById("modalGroupNameInput").focus();
      });
      document.getElementById("themeButton").addEventListener("click", () => {
        const dark = document.body.getAttribute("data-theme") === "dark";
        document.body.setAttribute("data-theme", dark ? "light" : "dark");
      });
      window.addEventListener("resize", () => {
        if (state.menuGroupId || state.contextDocId) renderMenuIfNeeded();
      });
    }

    bindEvents();
    renderAll();
  </script>
</body>
</html>
